name: go

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "go.work"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "agents/**"
      - "go.work"
      - ".github/workflows/go.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        session:
          - s01-natural-language-to-tool-calls
          - s02-own-your-prompts
          - s03-own-your-context-window
          - s04-tools-are-structured-outputs
          - s05-unify-execution-state
          - s06-launch-pause-resume
          - s07-contact-humans-with-tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: vet
        run: go vet ./...
        working-directory: agents/${{ matrix.session }}
      - name: build
        run: go build ./...
        working-directory: agents/${{ matrix.session }}
      - name: test
        run: |
          if [ -n "$(find . -name '*_test.go')" ]; then
            go test ./...
          else
            echo "no tests yet for ${{ matrix.session }}"
          fi
        working-directory: agents/${{ matrix.session }}
